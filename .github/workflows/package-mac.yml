name: Build MacOS DMG

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: Projet_ToDoList_Ghibli/app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Create DMG with jpackage
        run: |
          jpackage --type dmg \
            --dest target/dist \
            --name "GhibliTodo" \
            --main-jar app-1.0-SNAPSHOT.jar \
            --main-class com.ghibli.todolist.App \
            --module-path target/libs:target/app-1.0-SNAPSHOT.jar \
            --input target/ \
            --icon src/main/resources/background.icns || echo "Icon fail, continuing"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: GhibliTodo-Mac-DMG
          path: Projet_ToDoList_Ghibli/app/target/dist/*.dmg 
